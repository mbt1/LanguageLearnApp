# Production Docker Compose.
# Copy .env.example → .env, fill in secrets, then run:
#   docker compose -f docker-compose.prod.yml up -d

services:
  db:
    image: postgres:17
    restart: unless-stopped
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB:       ${POSTGRES_DB}
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s

  server:
    build:
      context: .
      target: server
    restart: unless-stopped
    env_file: .env
    depends_on:
      db:
        condition: service_healthy

  caddy:
    build:
      context: .
      target: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    environment:
      DOMAIN: "${DOMAIN}"
    depends_on:
      - server

  backup:
    build:
      context: .
      target: backup
    restart: unless-stopped
    env_file: .env
    volumes:
      - backups:/backups
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  caddy_data:
  caddy_config:
  backups:
