#
# Production Docker Compose.
#
# Quick start:
#   cp .env.example .env          # fill in all secrets
#   docker compose -f docker-compose.yml pull
#   docker compose -f docker-compose.yml up -d
#
# To build images locally instead of pulling from GHCR, replace each
# image: line with the commented-out build: block beneath it.

services:
  db:
    image: postgres:17
    restart: unless-stopped
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB:       ${POSTGRES_DB}
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s

  server:
    image: ${SERVER_IMAGE:-ghcr.io/languagelearn/languagelearn/server:latest}
    # build: { context: ., target: server }
    restart: unless-stopped
    env_file: .env
    depends_on:
      db:
        condition: service_healthy

  caddy:
    image: ${CADDY_IMAGE:-ghcr.io/languagelearn/languagelearn/caddy:latest}
    # build: { context: ., target: caddy }
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    environment:
      DOMAIN: "${DOMAIN}"
    depends_on:
      - server

  backup:
    image: ${BACKUP_IMAGE:-ghcr.io/languagelearn/languagelearn/backup:latest}
    # build: { context: ., target: backup }
    restart: unless-stopped
    env_file: .env
    volumes:
      - backups:/backups
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  caddy_data:
  caddy_config:
  backups:
