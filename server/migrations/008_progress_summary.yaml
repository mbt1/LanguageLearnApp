operations:
  - sql:
      up: |
        CREATE TABLE user_progress_summary (
          user_id       uuid NOT NULL REFERENCES users(id) ON DELETE CASCADE,
          course_id     uuid NOT NULL REFERENCES courses(id) ON DELETE CASCADE,
          cefr_level    cefr_level NOT NULL,
          total_concepts  int NOT NULL DEFAULT 0,
          not_started     int NOT NULL DEFAULT 0,
          seen            int NOT NULL DEFAULT 0,
          familiar        int NOT NULL DEFAULT 0,
          practiced       int NOT NULL DEFAULT 0,
          proficient      int NOT NULL DEFAULT 0,
          mastered        int NOT NULL DEFAULT 0,
          updated_at      timestamptz NOT NULL DEFAULT now(),
          PRIMARY KEY (user_id, course_id, cefr_level)
        );
      down: |
        DROP TABLE user_progress_summary;
