#
# Builds production Docker images and pushes them to GHCR tagged with the
# commit SHA. Certification (E2E testing + :latest promotion) is a separate
# pipeline (certify.yml) that runs independently.
#
# Images produced:
#   ghcr.io/OWNER/languagelearn/server:SHA
#   ghcr.io/OWNER/languagelearn/caddy:SHA
#   ghcr.io/OWNER/languagelearn/backup:SHA

name: Publish

on:
  push:
    branches: [main]
    paths:
      - 'client/**'
      - 'server/**'
      - 'scripts/**'
      - 'Dockerfile'
      - 'Caddyfile'
      - '.github/workflows/publish.yml'
  workflow_dispatch:

env:
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/languagelearn

jobs:
  publish:
    name: Build & push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push server image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: server
          push: true
          tags: ${{ env.IMAGE_PREFIX }}/server:${{ github.sha }}
          cache-from: type=gha,scope=server
          cache-to: type=gha,mode=max,scope=server

      - name: Build and push caddy image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: caddy
          push: true
          tags: ${{ env.IMAGE_PREFIX }}/caddy:${{ github.sha }}
          cache-from: type=gha,scope=caddy
          cache-to: type=gha,mode=max,scope=caddy

      - name: Build and push backup image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: backup
          push: true
          tags: ${{ env.IMAGE_PREFIX }}/backup:${{ github.sha }}
          cache-from: type=gha,scope=backup
          cache-to: type=gha,mode=max,scope=backup
